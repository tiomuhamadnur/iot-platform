version: '3.8'

services:
  nginx:
    restart: unless-stopped

  postgres:
    restart: unless-stopped

  influxdb:
    restart: unless-stopped

  redis:
    restart: unless-stopped

  emqx:
    restart: unless-stopped

  api:
    restart: unless-stopped
    environment:
      APP_ENV: production
      APP_DEBUG: false

  websocket:
    restart: unless-stopped

  ingestion:
    restart: unless-stopped

  frontend:
    restart: unless-stopped
